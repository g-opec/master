<!DOCTYPE html>
<html lang="pt-br">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <meta http-equiv="X-UA-Compatible" content="ie=edge">
 <link rel="apple-touch-icon" sizes="180x180" href="/master/fav/apple-touch-icon.png">
 <link rel="icon" type="image/png" sizes="32x32" href="/master/fav/favicon-32x32.png">
 <link rel="icon" type="image/png" sizes="16x16" href="/master/fav/favicon-16x16.png">
 <link rel="manifest" href="/master/fav/site.webmanifest">
 <title>G-opec</title>
 <style>
		body {
	box-sizing: border-box;
	min-height: 100%;
	margin: 0;
	padding: 15px 30px;
	display: flex;
	flex-direction: column;
	color: white;
	font-family: "Segoe UI","Helvetica Neue","Helvetica",Arial,sans-serif;
	background-color: #2C2C32;
}

.branding {
	background-image: url('https://g-opec.github.io/master/fav/favicon-32x32.png');
	background-size: 24px;
	background-repeat: no-repeat;
	background-position: left center;
	padding-left: 36px;
	font-size: 20px;
	letter-spacing: -0.04rem;
	font-weight: 400;
	color: white;
	text-decoration: none;
}
.container {
	height: 90vh;
	display: flex;
	align-items: center;
	justify-content: center;
	text-align: center;
}
.icon-container {
	margin-bottom: 24px;
}
.dev_photo {
	width: 153px;
	height: 153px;
	border-radius: 50%;
	border-style: solid;
  border-color: red;
	animation: rise-and-glow 1.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
}
.shell-title{
display: flex;
	align-items: center;
}
.title {
	font-size: 28px;
	font-weight: 300;
	margin: 0 0 0 10px;
	color: var(--vscode-foreground);
}

.subtitle {
	font-size: 18px;
	font-weight: 300;
	color: var(--vscode-foreground);
	opacity: 0.7;
	margin: 0 0 36px 0;
}

.detail {
	font-size: 14px;
	color: var(--vscode-foreground);
	opacity: 0.7;
	margin: 0;
}
.shell-loader {
                    flex-grow: 1;
                    display: -webkit-box;
                    display: -ms-flexbox;
                    display: flex;
                    opacity: 0;
                    box-sizing: border-box;
                    -webkit-animation: shell-display .1s linear;
                    animation: shell-display .1s linear;
                    -webkit-animation-delay: .3s;
                    animation-delay: .3s;
                    -webkit-animation-fill-mode: forwards;
                    animation-fill-mode: forwards;
                    overflow: hidden
                }

                /*.shell-loader__spinner {
                    position: absolute;
                    top: 50%;
                    left: 50%;
                    margin-right: -50%;
                    transform: translate(-50%, -50%)
                }*/

                .shell-loader__spinner::after {
                    content: '';
                    display: inline-block;
                    width: 2.2rem;
                    height: 2.2rem;
                    margin: 0 auto;
                    padding: 0;
                    border-top: 2px solid rgba(121, 120, 120, 0.25);
                    border-right: 2px solid rgba(121, 120, 120, 0.25);
                    border-bottom: 2px solid rgba(121, 120, 120, 0.25);
                    border-left: 2px solid #ff0000;
                    -webkit-animation: shell-loading-spinner .5s infinite linear;
                    animation: shell-loading-spinner .5s infinite linear;
                    border-radius: 50%;
                    box-sizing: border-box
                }

                @-webkit-keyframes shell-loading-spinner {
                    100% {
                        -webkit-transform: rotate(360deg);
                        transform: rotate(360deg)
                    }
                }

                @keyframes shell-loading-spinner {
                    100% {
                        -webkit-transform: rotate(360deg);
                        transform: rotate(360deg)
                    }
                }
				 @-webkit-keyframes shell-display {
                    0% {
                        opacity: 0
                    }

                    100% {
                        opacity: 1
                    }
                }

                @keyframes shell-display {
                    0% {
                        opacity: 0
                    }

                    100% {
                        opacity: 1
                    }
                }

.responsive-iframe {
  position: absolute;
  top: 0;
  left: 0;
  bottom: 0;
  right: 0;
  width: 100%;
  height: 100%;
  border: none;
}
</style>
 </head> 
<body>
   <a class="branding" href="https://g-opec.github.io/master/">
		G-opec
	</a>
	<div class="container">
	<div class="content">
			<div class="icon-container">
				<img src="https://g-opec.github.io/master/dev_photo.png" class="dev_photo">
			</div>
			<div class="shell-title">
			<div class="shell-loader" data-a-target="shell-loader">
                <div class="shell-loader__spinner"></div>
            </div>	
			<h1 class="title">Carregando página <span id="app-name"></span></h1>
			</div>
         <p id="sub"></p>
			<div class="message">
				<div class="success-message">
					<p class="subtitle"></p>
					<p class="detail"></p>
				</div>
				<div class="error-message">
					<p class="subtitle"></p>
					<div class="detail"></div>
				</div>
			</div>
		</div>
	</div>

<iframe id='my-gas-iframe' class="responsive-iframe" src="https://script.google.com/macros/s/AKfycbwPhXp8NbSH6JbEERcbxqSTix86QeilygGmH3PlQuTGJP8QVrhdQHo-Uob4powmTmOI5w/exec" allow="fullscreen; autoplay; camera; microphone; payment; geolocation">
</iframe>

<script>
  // Exibe o progresso visual
  let progress = 0;
  const progressBar = document.getElementById('progress');
  const interval = setInterval(() => {
    if (progress < 90) {
      progress += 10;
      progressBar.style.width = progress + '%';
    }
  }, 200);

  // FUNÇÃO DE CARREGAMENTO (Agora aceita o token FCM)
  function carregarIframe(fcmToken = null) {
    const iframeElement = document.getElementById('my-gas-iframe');
    // URL do seu Script Principal
    const baseSrc = "https://script.google.com/macros/s/AKfycbwPhXp8NbSH6JbEERcbxqSTix86QeilygGmH3PlQuTGJP8QVrhdQHo-Uob4powmTmOI5w/exec";
    
    const urlParams = new URLSearchParams(window.location.search);
    let authuser = urlParams.get('authuser') || sessionStorage.getItem('gopec_authuser');
    
    if (urlParams.get('authuser')) {
      sessionStorage.setItem('gopec_authuser', authuser);
      urlParams.delete('authuser');
      window.history.replaceState({}, document.title, window.location.pathname + (urlParams.toString() ? '?' + urlParams.toString() : ''));
    }

    const iframeParams = new URLSearchParams(window.location.search); 
    if (authuser) iframeParams.set('authuser', authuser); 
    
    // INJETA O TOKEN NA URL SE ELE EXISTIR
    if (fcmToken) {
      iframeParams.set('fcmToken', fcmToken);
    }
    
    const finalQuery = iframeParams.toString();
    iframeElement.src = finalQuery ? baseSrc + '?' + finalQuery : baseSrc;

    // Ajusta textos da tela de carregamento
    let pageName = iframeParams.get('page') || "Bem_vindo";
    let veiculoName = iframeParams.get('veiculo');
    document.getElementById('app-name').innerText = pageName.replace(/_/g, " ");
    document.getElementById('sub').innerText = (pageName !== "Bem_vindo" && veiculoName) ? veiculoName : "Sincronizando Autorizações do Usuário";

    // Finaliza a barra de progresso quando o iframe carregar
    iframeElement.onload = function() {
      clearInterval(interval);
      progressBar.style.width = '100%';
      setTimeout(() => {
        document.getElementById('loading-screen').style.display = 'none';
      }, 500);
    };
  }
</script>

    projectId: "g-opec-a2e19",
    storageBucket: "g-opec-a2e19.appspot.com",

        const token = await getToken(messaging, { 
          vapidKey: 'BLWnKiTWLlGeqztjOn7dXcVr2ip8xaHvA782mSPHTiqSDd--Z3F1yJLZaJ3h10MBAGScF2alP-0RJ4F-unNVcwE',
          serviceWorkerRegistration: registration 
        });
        
        if (token) {
          console.log('Token capturado:', token);
          tokenEncontrado = token;
        }
      }
    } catch (error) {
      console.log('Erro ao obter token FCM, carregando sem notificações:', error);
    }
    
    // CHAMA O CARREGAMENTO DO IFRAME (com ou sem token)
    carregarIframe(tokenEncontrado);
  }

  inicializarApp();
</script>
</body>
</html>
