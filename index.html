<!DOCTYPE html>
<html lang="pt-br">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <meta http-equiv="X-UA-Compatible" content="ie=edge">
 <link rel="apple-touch-icon" sizes="180x180" href="/master/fav/apple-touch-icon.png">
 <link rel="icon" type="image/png" sizes="32x32" href="/master/fav/favicon-32x32.png">
 <link rel="icon" type="image/png" sizes="16x16" href="/master/fav/favicon-16x16.png">
 <link rel="manifest" href="/master/fav/site.webmanifest">
 <title>G-opec</title>
 <style>
		body {
	box-sizing: border-box;
	min-height: 100%;
	margin: 0;
	padding: 15px 30px;
	display: flex;
	flex-direction: column;
	color: white;
	font-family: "Segoe UI","Helvetica Neue","Helvetica",Arial,sans-serif;
	background-color: #2C2C32;
}

.branding {
	background-image: url('https://g-opec.github.io/master/fav/favicon-32x32.png');
	background-size: 24px;
	background-repeat: no-repeat;
	background-position: left center;
	padding-left: 36px;
	font-size: 20px;
	letter-spacing: -0.04rem;
	font-weight: 400;
	color: white;
	text-decoration: none;
}
.container {
	height: 90vh;
	display: flex;
	align-items: center;
	justify-content: center;
	text-align: center;
}
.icon-container {
	margin-bottom: 24px;
}
.dev_photo {
	width: 153px;
	height: 153px;
	border-radius: 50%;
	border-style: solid;
  border-color: red;
	animation: rise-and-glow 1.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
}
.shell-title{
display: flex;
	align-items: center;
}
.title {
	font-size: 28px;
	font-weight: 300;
	margin: 0 0 0 10px;
	color: var(--vscode-foreground);
}

.subtitle {
	font-size: 18px;
	font-weight: 300;
	color: var(--vscode-foreground);
	opacity: 0.7;
	margin: 0 0 36px 0;
}

.detail {
	font-size: 14px;
	color: var(--vscode-foreground);
	opacity: 0.7;
	margin: 0;
}
.shell-loader {
                    flex-grow: 1;
                    display: -webkit-box;
                    display: -ms-flexbox;
                    display: flex;
                    opacity: 0;
                    box-sizing: border-box;
                    -webkit-animation: shell-display .1s linear;
                    animation: shell-display .1s linear;
                    -webkit-animation-delay: .3s;
                    animation-delay: .3s;
                    -webkit-animation-fill-mode: forwards;
                    animation-fill-mode: forwards;
                    overflow: hidden
                }

                /*.shell-loader__spinner {
                    position: absolute;
                    top: 50%;
                    left: 50%;
                    margin-right: -50%;
                    transform: translate(-50%, -50%)
                }*/

                .shell-loader__spinner::after {
                    content: '';
                    display: inline-block;
                    width: 2.2rem;
                    height: 2.2rem;
                    margin: 0 auto;
                    padding: 0;
                    border-top: 2px solid rgba(121, 120, 120, 0.25);
                    border-right: 2px solid rgba(121, 120, 120, 0.25);
                    border-bottom: 2px solid rgba(121, 120, 120, 0.25);
                    border-left: 2px solid #ff0000;
                    -webkit-animation: shell-loading-spinner .5s infinite linear;
                    animation: shell-loading-spinner .5s infinite linear;
                    border-radius: 50%;
                    box-sizing: border-box
                }

                @-webkit-keyframes shell-loading-spinner {
                    100% {
                        -webkit-transform: rotate(360deg);
                        transform: rotate(360deg)
                    }
                }

                @keyframes shell-loading-spinner {
                    100% {
                        -webkit-transform: rotate(360deg);
                        transform: rotate(360deg)
                    }
                }
				 @-webkit-keyframes shell-display {
                    0% {
                        opacity: 0
                    }

                    100% {
                        opacity: 1
                    }
                }

                @keyframes shell-display {
                    0% {
                        opacity: 0
                    }

                    100% {
                        opacity: 1
                    }
                }

.responsive-iframe {
  position: absolute;
  top: 0;
  left: 0;
  bottom: 0;
  right: 0;
  width: 100%;
  height: 100%;
  border: none;
}
</style>
	<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
  import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-messaging.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBndygRH9DVMivhAPxKlM4sOGyHyLsXw74",
    authDomain: "g-opec-a2e19.firebaseapp.com",
    projectId: "g-opec-a2e19",
    storageBucket: "g-opec-a2e19.firebasestorage.app",
    messagingSenderId: "539687706447",
    appId: "1:539687706447:web:66c89dcd63acbe47576f3a"
  };

  const app = initializeApp(firebaseConfig);
  const messaging = getMessaging(app);

  // Pede permissão e pega o token
  async function requestPermissionAndGetToken() {
    try {
      const permission = await Notification.requestPermission();
      if (permission === 'granted') {
        
        // 1. Registra o Service Worker manualmente apontando para a pasta /master/
        const registration = await navigator.serviceWorker.register('/master/firebase-messaging-sw.js');
        
        // 2. Passa o registro (registration) para o getToken do Firebase
        const token = await getToken(messaging, { 
          vapidKey: 'BLWnKiTWLlGeqztjOn7dXcVr2ip8xaHvA782mSPHTiqSDd--Z3F1yJLZaJ3h10MBAGScF2alP-0RJ4F-unNVcwE',
          serviceWorkerRegistration: registration 
        });
        
        if (token) {
          console.log('Token FCM:', token);
          enviarTokenParaAppsScript(token);
        }
      }
    } catch (error) {
      console.log('Erro ao pegar permissão', error);
    }
  }

  function enviarTokenParaAppsScript(fcmToken) {
    const urlSeuWebAppGAS = "https://script.google.com/macros/s/AKfycbz9nmtjMBrkQ4PsXMUiYpNy93vxMuwfnxIrwYKave3sWNfvsDBDiL___LHS8FOYQh15/exec"; // URL doPost
    const emailUsuario = sessionStorage.getItem('gopec_authuser');
    // email do usuário logado se já tiver no front-end, 
    // ou tratar isso do lado do GAS.
    fetch(urlSeuWebAppGAS, {
      method: 'POST',
      body: JSON.stringify({ action: 'saveToken', token: fcmToken, email: emailUsuario })
    });
  }

  // Chame a função quando a página carregar (ou via um botão "Ativar Notificações")
  requestPermissionAndGetToken();
</script>
 </head> 
<body>
   <a class="branding" href="https://g-opec.github.io/master/">
		G-opec
	</a>
	<div class="container">
	<div class="content">
			<div class="icon-container">
				<img src="https://g-opec.github.io/master/dev_photo.png" class="dev_photo">
			</div>
			<div class="shell-title">
			<div class="shell-loader" data-a-target="shell-loader">
                <div class="shell-loader__spinner"></div>
            </div>	
			<h1 class="title">Carregando página <span id="app-name"></span></h1>
			</div>
         <p id="sub"></p>
			<div class="message">
				<div class="success-message">
					<p class="subtitle"></p>
					<p class="detail"></p>
				</div>
				<div class="error-message">
					<p class="subtitle"></p>
					<div class="detail"></div>
				</div>
			</div>
		</div>
	</div>

<iframe id='my-gas-iframe' class="responsive-iframe" src="https://script.google.com/macros/s/AKfycbwPhXp8NbSH6JbEERcbxqSTix86QeilygGmH3PlQuTGJP8QVrhdQHo-Uob4powmTmOI5w/exec" allow="fullscreen; autoplay; camera; microphone; payment; geolocation">
</iframe>

<script>
    // 1. Encontrar o elemento iframe e definir a URL base do Apps Script
    const iframeElement = document.getElementById('my-gas-iframe');
    const baseSrc = "https://script.google.com/macros/s/AKfycbwPhXp8NbSH6JbEERcbxqSTix86QeilygGmH3PlQuTGJP8QVrhdQHo-Uob4powmTmOI5w/exec";

    // 2. Pegar os parâmetros da URL principal do navegador
    const urlParams = new URLSearchParams(window.location.search);
    
    // 3. Gerenciar o 'authuser' secretamente na sessão do navegador
    let authuser = urlParams.get('authuser');
    
    if (authuser) {
        // Se o authuser veio na URL (acabou de fazer login), salva na sessão da aba atual
        sessionStorage.setItem('gopec_authuser', authuser);
        
        // Apaga o authuser dos parâmetros da URL
        urlParams.delete('authuser');
        
        // Limpa a barra de endereços do navegador instantaneamente (sem recarregar a página)
        const novaUrlVisivel = window.location.pathname + (urlParams.toString() ? '?' + urlParams.toString() : '');
        window.history.replaceState({}, document.title, novaUrlVisivel);
    } else {
        // Se não veio na URL (ex: o usuário mudou de página internamente), recupera da memória
        authuser = sessionStorage.getItem('gopec_authuser');
    }

    // 4. Montar a URL real do Iframe que vai para os servidores do Google
    // Pega os parâmetros visíveis atuais (como page=Relatorios&veiculo=Massa Lages)
    const iframeParams = new URLSearchParams(window.location.search); 
    
    if (authuser) {
        // Injeta o authuser escondido direto para o Google Apps Script não perder a conta
        iframeParams.set('authuser', authuser); 
    }
    
    // Carrega o Iframe
    const finalQuery = iframeParams.toString();
    iframeElement.src = finalQuery ? baseSrc + '?' + finalQuery : baseSrc;
    console.log("Iframe carregado, authuser oculto do usuário.");

    // 5. Atualizar os textos da tela preta de carregamento do Shell
    let pageName = iframeParams.get('page') || "Bem_vindo";
    let veiculoName = iframeParams.get('veiculo');

    document.getElementById('app-name').innerText = pageName.replace(/_/g, " ");
    
    if (pageName !== "Bem_vindo" && veiculoName) {
        document.getElementById('sub').innerText = veiculoName;
    } else {
        document.getElementById('sub').innerText = "Sincronizando Autorizações do Usuário";
    }
</script>
	
</body>
</html>
